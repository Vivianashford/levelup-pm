<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivian - Task Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  .header { background: #0d0d14; border-bottom: 1px solid #1e1e2e; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header h1 span { color: #C9A84C; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .refresh-btn { background: #1e1e2e; border: 1px solid #2a2a3a; color: #aaa; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .refresh-btn:hover { background: #2a2a3a; color: #fff; }
  .last-update { font-size: 11px; color: #555; }

  .stats-bar { background: #0d0d14; padding: 12px 24px; display: flex; gap: 24px; border-bottom: 1px solid #1e1e2e; }
  .stat-pill { background: #111118; border: 1px solid #1e1e2e; border-radius: 20px; padding: 6px 16px; font-size: 12px; font-weight: 600; }
  .stat-pill .num { color: #C9A84C; margin-right: 4px; }

  .board { display: flex; gap: 16px; padding: 20px 24px; overflow-x: auto; min-height: calc(100vh - 130px); }

  .column { min-width: 300px; max-width: 340px; flex: 1; display: flex; flex-direction: column; }
  .column-header { padding: 12px 16px; border-radius: 10px 10px 0 0; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: space-between; }
  .column-header .count { background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .column-body { flex: 1; padding: 8px; border-radius: 0 0 10px 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }

  .col-queue .column-header { background: #1a1a3a; color: #818cf8; }
  .col-queue .column-body { background: #0f0f1f; border: 1px solid #1a1a3a; border-top: none; }

  .col-progress .column-header { background: #1a2a1a; color: #4ade80; }
  .col-progress .column-body { background: #0f1a0f; border: 1px solid #1a2a1a; border-top: none; }

  .col-review .column-header { background: #2a1a0a; color: #fbbf24; }
  .col-review .column-body { background: #1a130a; border: 1px solid #2a1a0a; border-top: none; }

  .col-done .column-header { background: #1a1a1a; color: #888; }
  .col-done .column-body { background: #0f0f0f; border: 1px solid #1a1a1a; border-top: none; }

  .col-blocked .column-header { background: #2a0a0a; color: #f87171; }
  .col-blocked .column-body { background: #1a0a0a; border: 1px solid #2a0a0a; border-top: none; }

  .tile { background: #111118; border: 1px solid #1e1e2e; border-radius: 8px; padding: 14px; cursor: default; transition: all 0.2s; }
  .tile:hover { border-color: #3a3a4a; transform: translateY(-1px); }
  .tile-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
  .tile-desc { font-size: 12px; color: #666; line-height: 1.4; margin-bottom: 8px; }
  .tile-footer { display: flex; align-items: center; justify-content: space-between; }
  .tile-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .tag-content { background: #1a1a3a; color: #818cf8; }
  .tag-infra { background: #1a2a2a; color: #2dd4bf; }
  .tag-funnel { background: #2a1a2a; color: #c084fc; }
  .tag-seo { background: #1a2a1a; color: #4ade80; }
  .tag-analytics { background: #2a2a1a; color: #fbbf24; }
  .tag-client { background: #2a1a0a; color: #fb923c; }
  .tag-ai { background: #0a1a2a; color: #38bdf8; }
  .tile-date { font-size: 10px; color: #444; }
  .tile-priority { font-size: 10px; font-weight: 700; }
  .priority-high { color: #f87171; }
  .priority-med { color: #fbbf24; }
  .priority-low { color: #4ade80; }

  @media (max-width: 900px) {
    .board { flex-direction: column; }
    .column { min-width: 100%; max-width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 <span>Vivian</span> Task Board</h1>
  <div class="header-right">
    <span class="last-update" id="lastUpdate">Loading...</span>
    <button class="refresh-btn" onclick="loadTasks()">🔄 Refresh</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="board" id="board">
  <div class="column col-queue">
    <div class="column-header">📋 Queued <span class="count" id="countQueue">0</span></div>
    <div class="column-body" id="colQueue"></div>
  </div>
  <div class="column col-progress">
    <div class="column-header">⚡ In Progress <span class="count" id="countProgress">0</span></div>
    <div class="column-body" id="colProgress"></div>
  </div>
  <div class="column col-review">
    <div class="column-header">👀 Needs Review <span class="count" id="countReview">0</span></div>
    <div class="column-body" id="colReview"></div>
  </div>
  <div class="column col-blocked">
    <div class="column-header">🚫 Blocked <span class="count" id="countBlocked">0</span></div>
    <div class="column-body" id="colBlocked"></div>
  </div>
  <div class="column col-done">
    <div class="column-header">✅ Done <span class="count" id="countDone">0</span></div>
    <div class="column-body" id="colDone"></div>
  </div>
</div>

<script>
const TASKS_URL = 'tasks.json';

function tile(t) {
  const tagClass = 'tag-' + (t.tag || 'content').toLowerCase();
  const priClass = 'priority-' + (t.priority || 'med').toLowerCase();
  return `<div class="tile">
    <div class="tile-title">${t.title}</div>
    ${t.desc ? `<div class="tile-desc">${t.desc}</div>` : ''}
    <div class="tile-footer">
      <span class="tile-tag ${tagClass}">${t.tag || 'task'}</span>
      <span class="tile-priority ${priClass}">${(t.priority || 'MED').toUpperCase()}</span>
    </div>
    ${t.date ? `<div class="tile-date" style="margin-top:6px">${t.date}</div>` : ''}
  </div>`;
}

async function loadTasks() {
  try {
    const r = await fetch(TASKS_URL + '?t=' + Date.now());
    const data = await r.json();
    const cols = { queue: [], progress: [], review: [], blocked: [], done: [] };

    data.tasks.forEach(t => {
      const col = t.status || 'queue';
      if (cols[col]) cols[col].push(t);
    });

    document.getElementById('colQueue').innerHTML = cols.queue.map(tile).join('');
    document.getElementById('colProgress').innerHTML = cols.progress.map(tile).join('');
    document.getElementById('colReview').innerHTML = cols.review.map(tile).join('');
    document.getElementById('colBlocked').innerHTML = cols.blocked.map(tile).join('');
    document.getElementById('colDone').innerHTML = cols.done.map(tile).join('');

    document.getElementById('countQueue').textContent = cols.queue.length;
    document.getElementById('countProgress').textContent = cols.progress.length;
    document.getElementById('countReview').textContent = cols.review.length;
    document.getElementById('countBlocked').textContent = cols.blocked.length;
    document.getElementById('countDone').textContent = cols.done.length;

    const total = data.tasks.length;
    const doneCount = cols.done.length;
    document.getElementById('statsBar').innerHTML = `
      <span class="stat-pill"><span class="num">${total}</span> total</span>
      <span class="stat-pill"><span class="num">${cols.progress.length}</span> active</span>
      <span class="stat-pill"><span class="num">${cols.review.length}</span> needs review</span>
      <span class="stat-pill"><span class="num">${cols.blocked.length}</span> blocked</span>
      <span class="stat-pill"><span class="num">${doneCount}</span> done</span>
    `;

    document.getElementById('lastUpdate').textContent = 'Updated: ' + (data.updated || new Date().toLocaleString());
    localStorage.setItem('vivian-tasks', JSON.stringify(data));
  } catch(e) {
    const cached = localStorage.getItem('vivian-tasks');
    if (cached) {
      const data = JSON.parse(cached);
      // re-render from cache
      document.getElementById('lastUpdate').textContent = 'Cached';
    } else {
      document.getElementById('lastUpdate').textContent = 'Failed to load';
    }
  }
}

loadTasks();
setInterval(loadTasks, 60 * 1000);
</script>
</body>
</html>
