<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jean Hardy — Daily Command Center</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:#0a0a0a; color:#f0ebe3; min-height:100vh; }

  .dashboard { max-width:700px; margin:0 auto; padding:20px; }

  .header { padding:20px 0 16px; border-bottom:1px solid rgba(201,168,76,.15); margin-bottom:20px; }
  .header h1 { font-family:'Playfair Display',serif; font-size:22px; color:#c9a84c; }
  .header .date { font-size:14px; color:#9a9590; margin-top:4px; }
  .header .updated { font-size:11px; color:#4a4540; margin-top:6px; }

  /* FOCUS BLOCK */
  .focus { background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.02)); border:1px solid rgba(201,168,76,.25); border-radius:12px; padding:20px; margin-bottom:24px; }
  .focus-label { font-size:10px; color:#c9a84c; text-transform:uppercase; letter-spacing:2px; font-weight:700; margin-bottom:6px; }
  .focus-task { font-family:'Playfair Display',serif; font-size:20px; color:#f0ebe3; line-height:1.4; }
  .focus-sub { font-size:13px; color:#6b655e; margin-top:6px; }

  /* SECTION */
  .section { margin-bottom:24px; }
  .section-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid rgba(255,255,255,.04); }
  .section-dot { width:8px; height:8px; border-radius:50%; }
  .section-title { font-size:12px; text-transform:uppercase; letter-spacing:2px; font-weight:600; }

  .dot-arena { background:#c9a84c; }
  .dot-levelup { background:#6a9fd8; }
  .dot-tofc { background:#d87a6a; }
  .dot-personal { background:#8b7fd8; }
  .dot-ops { background:#4a8c5c; }

  .title-arena { color:#c9a84c; }
  .title-levelup { color:#6a9fd8; }
  .title-tofc { color:#d87a6a; }
  .title-personal { color:#8b7fd8; }
  .title-ops { color:#4a8c5c; }

  /* TODO ITEMS */
  .todo { display:flex; align-items:flex-start; gap:10px; padding:8px 10px; border-radius:8px; margin-bottom:4px; cursor:pointer; transition:background .15s; }
  .todo:hover { background:rgba(255,255,255,.03); }
  .todo-check { width:18px; height:18px; border:2px solid #3a3a3a; border-radius:4px; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
  .todo.done .todo-check { background:#4a8c5c; border-color:#4a8c5c; }
  .todo.done .todo-check::after { content:'✓'; color:#fff; font-size:11px; font-weight:700; }
  .todo.done .todo-text { text-decoration:line-through; color:#4a4540; }
  .todo-content { flex:1; }
  .todo-text { font-size:14px; color:#d4cfc8; line-height:1.4; }
  .todo-meta { font-size:11px; color:#4a4540; margin-top:2px; }
  .todo-priority { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding:1px 6px; border-radius:3px; margin-left:6px; }
  .p-high { background:rgba(184,60,48,.15); color:#b83c30; }
  .p-med { background:rgba(201,168,76,.12); color:#c9a84c; }
  .p-low { background:rgba(100,100,120,.1); color:#6b655e; }

  /* DONE SECTION */
  .done-section { margin-top:24px; padding-top:16px; border-top:1px solid rgba(255,255,255,.04); }
  .done-header { font-size:11px; color:#4a4540; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; cursor:pointer; }
  .done-header:hover { color:#6b655e; }

  /* STATS BAR */
  .stats-bar { display:flex; gap:16px; margin-bottom:20px; }
  .stats-bar .sb { font-size:12px; color:#6b655e; }
  .stats-bar .sb strong { color:#f0ebe3; }

  /* MOBILE */
  @media(max-width:600px) {
    .dashboard { padding:14px; }
    .focus-task { font-size:17px; }
  }
</style>
</head>
<body>

<div class="dashboard">
  <div class="header">
    <h1>Daily Command Center</h1>
    <div class="date" id="today-date"></div>
    <div class="updated" id="last-updated"></div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- DAILY ROUTINE -->
  <div class="section" id="routine-section" style="margin-bottom:20px;">
    <div class="section-head" style="cursor:pointer;" onclick="toggleRoutine()">
      <span class="section-title" style="color:#8b7fd8;">Morning Routine</span>
      <span class="section-count" id="routine-toggle">▾</span>
    </div>
    <div id="routine-list"></div>
  </div>

  <!-- FLOW BLOCK FOCUS -->
  <div class="focus" id="focus-block"></div>

  <!-- TODO SECTIONS -->
  <div id="todo-sections"></div>

  <!-- COMPLETED -->
  <div class="done-section" id="done-section">
    <div class="done-header" onclick="toggleDone()">✓ Completed (<span id="done-count">0</span>) ▾</div>
    <div id="done-list" style="display:none;"></div>
  </div>
</div>

<script>
// ============================================================
// DATA — Vivian updates this daily
// ============================================================
var DATA = {
  lastUpdated: "March 20, 2026 — 7:15 AM CDT",
  
  focus: {
    task: "Grant + George follow-ups: Data room, one-sheets, Zoom link",
    sub: "Flow Block 1 · 4 action items due TODAY from yesterday's calls"
  },

  // MORNING ROUTINE (non-negotiable)
  dailyRoutine: [
    { time: "6:00 AM", task: "Prayer (1 hour)", icon: "🙏" },
    { time: "7:00 AM", task: "Abs", icon: "💪" },
    { time: "7:00 AM", task: "Back", icon: "💪" },
    { time: "7:00 AM", task: "Legs", icon: "💪" },
    { time: "7:00 AM", task: "Pull-ups", icon: "💪" },
  ],

  todos: [
    // ===== ARENA =====
    // ===== ARENA =====
    // From Grant call (March 19) - HIGH PRIORITY
    { text: "Send Grant the data room + one-sheet", project: "arena", priority: "high", done: false, meta: "📞 Grant call. 🤖 Vivian can build the data room page + one-sheet PDF. Just say go." },
    { text: "Set up Zoom link for Grant deep-dive", project: "arena", priority: "high", done: false, meta: "📞 Grant call. 🤖 Vivian can create Zoom link + send calendar invite if you give Grant's email." },
    { text: "Email Grant: exit strategy partnership next steps", project: "arena", priority: "high", done: false, meta: "📞 Pocket action item. 🤖 Vivian has draft email ready from Pocket. Say 'send Grant email' to review + fire." },
    
    // From George call (March 19)
    { text: "Email George the one-sheet for feedback", project: "arena", priority: "high", done: false, meta: "📞 George call. 🤖 Vivian can send to george@georgedecurvecommunications.com. Same one-sheet as Grant." },
    { text: "Schedule coffee with George next time in Vancouver", project: "arena", priority: "low", done: false, meta: "📞 Pocket. Low urgency — park until next Van trip." },

    // From John Cameron call (March 19)
    { text: "Refine VTM workshop framing for sellers (pride-based)", project: "arena", priority: "med", done: false, meta: "📞 John Cameron. 🤖 Already done — VSL deck v2 uses pride messaging. Review deck to confirm." },
    
    // From TOFC/Eden call
    { text: "Draft Vision Traction Workshop pitch for Eden (Daniel + Jonah)", project: "arena", priority: "med", done: false, meta: "📞 Pocket. 🤖 Vivian can draft the email. 3-day intensive, cover travel + lodging only. Say 'draft Eden pitch.'" },
    { text: "Text Brandon re: Grant's regards", project: "arena", priority: "low", done: false, meta: "📞 Pocket. 🤖 Vivian can send via iMessage/WhatsApp. Just say 'text Brandon.'" },

    // Ongoing Arena
    { text: "Rewrite funnel landing page copy (pride-based)", project: "arena", priority: "med", done: false, meta: "🤖 Vivian can rewrite thearenapartners.com copy to match new VSL deck. Say 'rewrite landing page.'" },
    { text: "Record VSL video", project: "arena", priority: "med", done: false, meta: "⚠️ Only Jean can do this. Deck v2 is ready as teleprompter. 78 slides, ~23 min." },
    { text: "Build training materials framework (document client #1)", project: "arena", priority: "med", done: false, meta: "🤖 Vivian can set up the doc structure + weekly capture template. Say 'build training framework.'" },

    // ===== LEVEL UP =====
    { text: "Write tonight's PR article (9 PM)", project: "levelup", priority: "med", done: false, meta: "🤖 Vivian handles this. Auto-publishes at 9 PM to group chat." },
    { text: "Get Logan's article spreadsheet and sync to dashboard", project: "levelup", priority: "low", done: false, meta: "🤖 Send Vivian the spreadsheet link or screenshot. She'll sync to vivianashford.github.io/levelup-pm/" },
    { text: "Collect bank statements for Asim (accounting)", project: "levelup", priority: "med", done: false, meta: "⚠️ Only Jean can do this. Asim needs all statements from business start. $432, 14-day delivery." },

    // ===== TOFC =====
    { text: "Request inventory email blast from Marie (3,000 contacts)", project: "tofc", priority: "high", done: false, meta: "📞 Pocket. 🤖 Vivian can draft the message to Marie. Say 'draft Marie blast message.'" },
    { text: "Update inventory sheet with bottom-line prices", project: "tofc", priority: "high", done: false, meta: "📞 Pocket. ⚠️ Jen/Val need to provide updated numbers. Was due yesterday." },
    { text: "Switch TOFC bot to Claude API (replace ManyChat)", project: "tofc", priority: "med", done: false, meta: "📞 TOFC call. 🤖 Vivian can build the Claude API integration. Need TOFC's ManyChat webhook URL." },
    { text: "Post inventory to Instagram + run ads from posts", project: "tofc", priority: "med", done: false, meta: "📞 TOFC call. ⚠️ Sydney posts daily. Jean runs ads from those posts." },
    { text: "Email TOFC team Claude API requirements", project: "tofc", priority: "med", done: false, meta: "📞 TOFC call. 🤖 Vivian can draft the requirements email. Say 'draft TOFC Claude email.'" },

    // ===== OPS =====
    { text: "Re-auth Google OAuth (gog auth login)", project: "ops", priority: "med", done: false, meta: "⚠️ Only Jean. Run 'gog auth login' in terminal. 2 min. Unblocks email + calendar visibility." },
    { text: "Document OpenClaw/Claude agent setup for team scaling", project: "ops", priority: "low", done: false, meta: "📞 Pocket. Due Mar 22. 🤖 Vivian can write the documentation. Say 'document agent setup.'" },
    { text: "Send Vivian Fireflies.ai API key", project: "ops", priority: "low", done: false, meta: "⚠️ Only Jean. Go to app.fireflies.ai → Settings → Developer API → copy key. Send to Vivian." },

    // ===== PERSONAL =====
    { text: "Confirm Operating Partner role with Track One / Cracking Capital", project: "personal", priority: "low", done: false, meta: "📞 Pocket. Due Mar 23. ⚠️ Only Jean. Restaurants, RV parks, daycares." },
    { text: "Follow up with Ken/Saud on PE role", project: "personal", priority: "low", done: false, meta: "⚠️ Only Jean. Salary ceiling $98-100K vs $110K target." },
  ]
};

// ============================================================
// RENDER
// ============================================================
var projectConfig = {
  arena: { label: "The Arena", dot: "dot-arena", title: "title-arena" },
  levelup: { label: "Level Up With Anna", dot: "dot-levelup", title: "title-levelup" },
  tofc: { label: "TOFC", dot: "dot-tofc", title: "title-tofc" },
  personal: { label: "Personal", dot: "dot-personal", title: "title-personal" },
  ops: { label: "Operations", dot: "dot-ops", title: "title-ops" }
};

function render() {
  // Date
  var now = new Date();
  var opts = {weekday:'long', year:'numeric', month:'long', day:'numeric'};
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-US', opts);
  document.getElementById('last-updated').textContent = 'Updated by Vivian: ' + DATA.lastUpdated;

  // Routine
  if (DATA.dailyRoutine) {
    var rHTML = '';
    var nowHr = new Date().getHours();
    DATA.dailyRoutine.forEach(function(r) {
      var hr = parseInt(r.time);
      var isPM = r.time.includes('PM') && !r.time.includes('12');
      if (isPM) hr += 12;
      var active = (nowHr >= hr && nowHr < hr + 2) ? 'border-color:rgba(139,127,216,.4);background:rgba(139,127,216,.06);' : '';
      rHTML += '<div style="display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:8px;margin-bottom:3px;border:1px solid rgba(255,255,255,.03);'+active+'">';
      rHTML += '<span style="font-size:18px;">'+r.icon+'</span>';
      rHTML += '<span style="font-size:12px;color:#6b655e;min-width:70px;">'+r.time+'</span>';
      rHTML += '<span style="font-size:13px;color:#9a9590;">'+r.task+'</span>';
      rHTML += '</div>';
    });
    document.getElementById('routine-list').innerHTML = rHTML;
  }

  // Focus
  document.getElementById('focus-block').innerHTML =
    '<div class="focus-label">⚡ Flow Block 1 Priority</div>' +
    '<div class="focus-task">' + DATA.focus.task + '</div>' +
    '<div class="focus-sub">' + DATA.focus.sub + '</div>';

  // Stats
  var total = DATA.todos.length;
  var doneCount = DATA.todos.filter(function(t){return t.done}).length;
  var highOpen = DATA.todos.filter(function(t){return !t.done && t.priority==='high'}).length;
  document.getElementById('stats-bar').innerHTML =
    '<div class="sb"><strong>' + (total-doneCount) + '</strong> open</div>' +
    '<div class="sb"><strong>' + doneCount + '</strong> done</div>' +
    '<div class="sb"><strong>' + highOpen + '</strong> urgent</div>';

  // Group by project (only open items)
  var groups = {};
  var doneItems = [];
  DATA.todos.forEach(function(t,i) {
    t._idx = i;
    if (t.done) { doneItems.push(t); return; }
    if (!groups[t.project]) groups[t.project] = [];
    groups[t.project].push(t);
  });

  // Render sections in order
  var order = ['arena','levelup','tofc','ops','personal'];
  var sectionsHTML = '';
  order.forEach(function(proj) {
    if (!groups[proj] || groups[proj].length === 0) return;
    var cfg = projectConfig[proj];
    sectionsHTML += '<div class="section">';
    sectionsHTML += '<div class="section-head"><div class="section-dot '+cfg.dot+'"></div><span class="section-title '+cfg.title+'">'+cfg.label+'</span></div>';
    // Sort by priority within section
    var pOrder = {high:0, med:1, low:2};
    groups[proj].sort(function(a,b){ return (pOrder[a.priority]||9) - (pOrder[b.priority]||9); });
    groups[proj].forEach(function(t) {
      sectionsHTML += renderTodo(t);
    });
    sectionsHTML += '</div>';
  });
  document.getElementById('todo-sections').innerHTML = sectionsHTML;

  // Done items
  document.getElementById('done-count').textContent = doneItems.length;
  var doneHTML = '';
  doneItems.forEach(function(t) { doneHTML += renderTodo(t); });
  document.getElementById('done-list').innerHTML = doneHTML;
}

function renderTodo(t) {
  var cls = t.done ? 'todo done' : 'todo';
  var pBadge = '';
  if (t.priority === 'high') pBadge = '<span class="todo-priority p-high">urgent</span>';
  else if (t.priority === 'med') pBadge = '<span class="todo-priority p-med">today</span>';
  var html = '<div class="'+cls+'" onclick="toggleTodo('+t._idx+')">';
  html += '<div class="todo-check"></div>';
  html += '<div class="todo-content">';
  html += '<div class="todo-text">' + t.text + pBadge + '</div>';
  if (t.meta) html += '<div class="todo-meta">' + t.meta + '</div>';
  html += '</div></div>';
  return html;
}

function toggleTodo(idx) {
  DATA.todos[idx].done = !DATA.todos[idx].done;
  render();
}

function toggleDone() {
  var el = document.getElementById('done-list');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function toggleRoutine() {
  var el = document.getElementById('routine-list');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

render();
</script>
</body>
</html>
