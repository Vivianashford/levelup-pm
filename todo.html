<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Jean Hardy  -  Todo List</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:#0a0a0a; color:#f0ebe3; min-height:100vh; }

  .dashboard { max-width:700px; margin:0 auto; padding:20px; }

  .header { padding:20px 0 16px; border-bottom:1px solid rgba(201,168,76,.15); margin-bottom:20px; }
  .header h1 { font-family:'Playfair Display',serif; font-size:22px; color:#c9a84c; }
  .header .date { font-size:14px; color:#9a9590; margin-top:4px; }
  .header .updated { font-size:11px; color:#4a4540; margin-top:6px; }

  /* FOCUS BLOCK */
  .focus { background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.02)); border:1px solid rgba(201,168,76,.25); border-radius:12px; padding:20px; margin-bottom:24px; }
  .focus-label { font-size:10px; color:#c9a84c; text-transform:uppercase; letter-spacing:2px; font-weight:700; margin-bottom:6px; }
  .focus-task { font-family:'Playfair Display',serif; font-size:20px; color:#f0ebe3; line-height:1.4; }
  .focus-sub { font-size:13px; color:#6b655e; margin-top:6px; }

  /* SECTION */
  .section { margin-bottom:24px; }
  .section-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid rgba(255,255,255,.04); }
  .section-dot { width:8px; height:8px; border-radius:50%; }
  .section-title { font-size:12px; text-transform:uppercase; letter-spacing:2px; font-weight:600; }

  .dot-arena { background:#c9a84c; }
  .dot-levelup { background:#6a9fd8; }
  .dot-tofc { background:#d87a6a; }
  .dot-personal { background:#8b7fd8; }
  .dot-ops { background:#4a8c5c; }

  .title-arena { color:#c9a84c; }
  .title-levelup { color:#6a9fd8; }
  .title-tofc { color:#d87a6a; }
  .title-personal { color:#8b7fd8; }
  .title-ops { color:#4a8c5c; }

  /* TODO ITEMS */
  .todo { display:flex; align-items:flex-start; gap:10px; padding:8px 10px; border-radius:8px; margin-bottom:4px; cursor:pointer; transition:background .15s; }
  .todo:hover { background:rgba(255,255,255,.03); }
  .todo-check { width:18px; height:18px; border:2px solid #3a3a3a; border-radius:4px; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
  .todo.done .todo-check { background:#4a8c5c; border-color:#4a8c5c; }
  .todo.done .todo-check::after { content:'✓'; color:#fff; font-size:11px; font-weight:700; }
  .todo.done .todo-text { text-decoration:line-through; color:#4a4540; }
  .todo-content { flex:1; }
  .todo-text { font-size:14px; color:#d4cfc8; line-height:1.4; }
  .todo-meta { font-size:11px; color:#4a4540; margin-top:2px; }
  .todo-priority { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding:1px 6px; border-radius:3px; margin-left:6px; }
  .p-high { background:rgba(184,60,48,.15); color:#b83c30; }
  .p-med { background:rgba(201,168,76,.12); color:#c9a84c; }
  .p-low { background:rgba(100,100,120,.1); color:#6b655e; }
  .todo-rate { font-size:10px; font-weight:600; padding:1px 6px; border-radius:3px; margin-left:4px; }
  .rate-rev { background:rgba(74,140,92,.15); color:#4a8c5c; }
  .rate-ops { background:rgba(100,100,120,.08); color:#6b655e; }

  /* DONE SECTION */
  .done-section { margin-top:24px; padding-top:16px; border-top:1px solid rgba(255,255,255,.04); }
  .done-header { font-size:11px; color:#4a4540; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; cursor:pointer; }
  .done-header:hover { color:#6b655e; }

  /* STATS BAR */
  .stats-bar { display:flex; gap:16px; margin-bottom:20px; }
  .stats-bar .sb { font-size:12px; color:#6b655e; }
  .stats-bar .sb strong { color:#f0ebe3; }

  /* MOBILE */
  @media(max-width:600px) {
    .dashboard { padding:14px; }
    .focus-task { font-size:17px; }
  }
</style>
</head>
<body>

<div class="dashboard">
  <div class="header">
    <h1>Daily Command Center</h1>
    <div class="date" id="today-date"></div>
    <div class="updated" id="last-updated"></div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- DAILY ROUTINE -->
  <div class="section" id="routine-section" style="margin-bottom:20px;">
    <div class="section-head" style="cursor:pointer;" onclick="toggleRoutine()">
      <span class="section-title" style="color:#8b7fd8;">🔒 Non-Negotiables</span>
      <span class="section-count" id="routine-toggle">▾</span>
    </div>
    <div id="routine-list"></div>
  </div>

  <!-- FLOW BLOCK FOCUS -->
  <div class="focus" id="focus-block"></div>

  <!-- TODO SECTIONS -->
  <div id="todo-sections"></div>

  <!-- COMPLETED -->
  <div class="done-section" id="done-section">
    <div class="done-header" onclick="toggleDone()">✓ Completed (<span id="done-count">0</span>) ▾</div>
    <div id="done-list" style="display:none;"></div>
  </div>
</div>

<script>
// ============================================================

// ============================================================

    { time: "7:00 AM", task: "Abs", icon: "💪", id: "abs" },
    { time: "7:00 AM", task: "Back", icon: "💪", id: "back" },
    { time: "7:00 AM", task: "Legs", icon: "💪", id: "legs" },
    { time: "7:00 AM", task: "Pull-ups", icon: "💪", id: "pullups" },
  ],
  todos: [
    { text: "Record VSL video", project: "arena", priority: "high", done: false, rev: true, rate: "$5,000+/hr", meta: "REVENUE. #1 blocker. Entire funnel built but top is empty. Only Jean." },
    { text: "Post Day 1 LinkedIn content (Orkin story)", project: "arena", priority: "high", done: false, rev: true, rate: "$1,000/hr", meta: "REVENUE. 30 days ready. Copy from linkedin/content-calendar.md. Only Jean." },
    { text: "Set up LinkedIn automation (Dripify or Expandi)", project: "arena", priority: "high", done: false, rev: true, rate: "$500/hr", meta: "REVENUE. Auto-connects + DM sequences. See linkedin/automation-plan.md. Only Jean." },
    { text: "Optimize LinkedIn profile (headline, about, featured)", project: "arena", priority: "high", done: false, rev: true, rate: "$500/hr", meta: "REVENUE. Copy from linkedin/profile-optimization.md. Only Jean." },
    { text: "Send 20 targeted LinkedIn connections", project: "arena", priority: "high", done: false, rev: true, rate: "$500/hr", meta: "REVENUE. Use filters from linkedin/search-targets.md. Only Jean." },
    { text: "Derick Chin agreements", project: "arena", priority: "high", done: false, rev: true, rate: "$5,000+/hr", meta: "REVENUE. Only Jean." },
    { text: "Send Grant the data room + one-sheet", project: "arena", priority: "high", done: false, rev: true, rate: "$5,000+/hr", meta: "REVENUE. $150-200K close. Vivian builds. Jean sends." },
    { text: "Follow up with Eddie Gant on marked-up document", project: "arena", priority: "med", done: false, rev: true, rate: "$2,000/hr", meta: "REVENUE. $4K deposit, $7M capital deadline Apr 7. Only Jean." },
    { text: "Schedule Session 1: Eddie + Johnny + staff", project: "arena", priority: "high", done: false, rev: true, rate: "$5,000+/hr", meta: "REVENUE. First client builds repeatable system. Only Jean." },
    { text: "Schedule Session 2: Eddie + Johnny only", project: "arena", priority: "high", done: false, rev: true, rate: "$5,000+/hr", meta: "REVENUE. Exit timeline, financial targets. Only Jean." },
    { text: "Build onboarding page: Phase 1-4 tracker", project: "arena", priority: "med", done: false, rev: true, rate: "$2,500/hr", meta: "REVENUE. Client sees progress. Vivian builds." },
    { text: "Create pre-visit prep checklist", project: "arena", priority: "med", done: false, rev: true, rate: "$2,500/hr", meta: "REVENUE. Key people, system access, docs. Vivian drafts." },
    { text: "Build interview templates for on-site meetings", project: "arena", priority: "med", done: false, rev: true, rate: "$2,500/hr", meta: "REVENUE. Ops, sales, admin templates. Vivian drafts." },
    { text: "Wire Stripe API for live revenue on Command Center", project: "arena", priority: "med", done: false, rev: false, rate: "$100/hr", meta: "Need Stripe API key. Vivian wires." },

    { text: "Build quarterly newsletter for post-nurture contacts", project: "arena", priority: "low", done: false, rev: false, rate: "$50/hr", meta: "Vivian builds." },
    { text: "GA4 analytics wired to all pages + Command Center", project: "arena", priority: "low", done: true, rev: false, rate: "$0/hr", meta: "DONE. G-SDMM90P63D. Service account connected." },

    { text: "PostGrid + Handwrytten direct mail wired", project: "arena", priority: "low", done: true, rev: false, rate: "$0/hr", meta: "DONE. 4 mail pieces in nurture." },
    { text: "Domain warmup started (28 days)", project: "arena", priority: "low", done: true, rev: false, rate: "$0/hr", meta: "DONE. Day 1 of 28. 10 seeds." },
    { text: "Blog launched (10 SEO articles)", project: "arena", priority: "low", done: true, rev: false, rate: "$0/hr", meta: "DONE. Story-driven, real citations." },
    { text: "LinkedIn content system built", project: "arena", priority: "low", done: true, rev: false, rate: "$0/hr", meta: "DONE. 30 days posts + DMs + targeting." },
    { text: "Story-driven branding across all content", project: "arena", priority: "low", done: true, rev: false, rate: "$0/hr", meta: "DONE. 35 Transferable Stories everywhere." },
    { text: "Engagement agreement page built", project: "arena", priority: "low", done: true, rev: false, rate: "$0/hr", meta: "DONE. Signature + Stripe at agreement.html" },
    { text: "Sales SOP rebuilt (standalone)", project: "arena", priority: "low", done: true, rev: false, rate: "$0/hr", meta: "DONE. All 10 stages documented." },
    { text: "Clients page with review workflow", project: "arena", priority: "low", done: true, rev: false, rate: "$0/hr", meta: "DONE. Urgent/Reviewed/Completed tabs." },
    { text: "Call Ben Huynh re: TN visa date", project: "personal", priority: "high", done: false, rev: false, rate: "$0/hr", meta: "PERSONAL. Ben ready. Pick USCIS-Vancouver date. Only Jean." },
    { text: "Complete PetScreening profile (Alexan)", project: "personal", priority: "med", done: false, rev: false, rate: "$0/hr", meta: "PERSONAL. Flagged non-compliant. Only Jean." },
    { text: "Update Book of Self for 2026", project: "personal", priority: "med", done: false, rev: false, rate: "$0/hr", meta: "PERSONAL. Mindset foundation." },
    { text: "Recover ashfordviva@gmail.com", project: "personal", priority: "low", done: false, rev: false, rate: "$0/hr", meta: "PERSONAL. Account disabled. Appeal or new." },
    { text: "Request inventory email blast from Marie (3,000 contacts)", project: "tofc", priority: "high", done: false, rev: true, rate: "$1,000/hr", meta: "REVENUE. 3,000 contacts = pipeline." },
    { text: "Update inventory sheet with bottom-line prices", project: "tofc", priority: "med", done: false, rev: true, rate: "$500/hr", meta: "REVENUE. Jen/Val provide numbers." },
    { text: "Confirm AJ (famous.ai) - 900+ press releases", project: "levelup", priority: "high", done: false, rev: false, rate: "$25/hr", meta: "OPS. 5 min check-in. Only Jean." },
    { text: "Collect bank statements for Asim", project: "levelup", priority: "med", done: false, rev: false, rate: "$25/hr", meta: "OPS. $432, 14-day delivery. Only Jean." },
    { text: "Clear Nikil's invoices", project: "ops", priority: "med", done: false, rev: false, rate: "$25/hr", meta: "OPS. Admin. 5 minutes. Only Jean." },
    { text: "Send Vivian Fireflies.ai API key", project: "ops", priority: "low", done: false, rev: false, rate: "$25/hr", meta: "OPS. Copy key from settings. Only Jean." },
  ]
};
// ============================================================
// RENDER
// ============================================================
var projectConfig = {
  arena: { label: "The Arena", dot: "dot-arena", title: "title-arena" },
  levelup: { label: "Level Up With Anna", dot: "dot-levelup", title: "title-levelup" },
  tofc: { label: "TOFC", dot: "dot-tofc", title: "title-tofc" },
  personal: { label: "Personal", dot: "dot-personal", title: "title-personal" },
  ops: { label: "Operations", dot: "dot-ops", title: "title-ops" }
};

function render() {
  // Date
  var now = new Date();
  var opts = {weekday:'long', year:'numeric', month:'long', day:'numeric'};
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-US', opts);
  document.getElementById('last-updated').textContent = 'Updated by Vivian: ' + DATA.lastUpdated;

  // Non-negotiables
  if (DATA.dailyRoutine) {
    // Load saved state from localStorage (resets daily)
    var today = new Date().toDateString();
    var nnState = JSON.parse(localStorage.getItem('nn-state') || '{}');
    if (nnState.date !== today) { nnState = { date: today, done: {} }; }
    
    var rHTML = '';
    var nowHr = new Date().getHours();
    var allDone = true;
    
    DATA.dailyRoutine.forEach(function(r) {
      var isDone = nnState.done[r.id] || false;
      if (!isDone) allDone = false;
      var checkStyle = isDone 
        ? 'background:#4a8c5c;border-color:#4a8c5c;' 
        : 'border:2px solid #3a3a3a;';
      var textStyle = isDone ? 'text-decoration:line-through;color:#4a4540;' : 'color:#d4cfc8;';
      
      rHTML += '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:3px;cursor:pointer;border:1px solid rgba(255,255,255,.03);" onclick="toggleNN(\''+r.id+'\')">';
      rHTML += '<div style="width:18px;height:18px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;'+checkStyle+'">';
      if (isDone) rHTML += '<span style="color:#fff;font-size:11px;font-weight:700;">✓</span>';
      rHTML += '</div>';
      rHTML += '<span style="font-size:18px;">'+r.icon+'</span>';
      rHTML += '<span style="font-size:14px;'+textStyle+'">'+r.task+'</span>';
      rHTML += '</div>';
    });
    
    // Warning if past 8PM and not all done
    if (nowHr >= 20 && !allDone) {
      rHTML = '<div style="background:rgba(184,60,48,.12);border:1px solid rgba(184,60,48,.3);border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:#b83c30;font-weight:600;">⚠️ Get these done before bed. No excuses.</div>' + rHTML;
    }
    
    document.getElementById('routine-list').innerHTML = rHTML;
  }

  // Focus
  document.getElementById('focus-block').innerHTML =
    '<div class="focus-label">⚡ Flow Block 1 Priority</div>' +
    '<div class="focus-task">' + DATA.focus.task + '</div>' +
    '<div class="focus-sub">' + DATA.focus.sub + '</div>';

  // Stats
  var total = DATA.todos.length;
  var doneCount = DATA.todos.filter(function(t){return t.done}).length;
  var highOpen = DATA.todos.filter(function(t){return !t.done && t.priority==='high'}).length;
  document.getElementById('stats-bar').innerHTML =
    '<div class="sb"><strong>' + (total-doneCount) + '</strong> open</div>' +
    '<div class="sb"><strong>' + doneCount + '</strong> done</div>' +
    '<div class="sb"><strong>' + highOpen + '</strong> urgent</div>';

  // Group by project (only open items)
  var groups = {};
  var doneItems = [];
  DATA.todos.forEach(function(t,i) {
    t._idx = i;
    if (t.done) { doneItems.push(t); return; }
    if (!groups[t.project]) groups[t.project] = [];
    groups[t.project].push(t);
  });

  // Render sections in order
  var order = ['arena','levelup','tofc','ops','personal'];
  var sectionsHTML = '';
  order.forEach(function(proj) {
    if (!groups[proj] || groups[proj].length === 0) return;
    var cfg = projectConfig[proj];
    sectionsHTML += '<div class="section">';
    sectionsHTML += '<div class="section-head"><div class="section-dot '+cfg.dot+'"></div><span class="section-title '+cfg.title+'">'+cfg.label+'</span></div>';
    // Sort by priority within section
    var pOrder = {high:0, med:1, low:2};
    groups[proj].sort(function(a,b){ return (pOrder[a.priority]||9) - (pOrder[b.priority]||9); });
    groups[proj].forEach(function(t) {
      sectionsHTML += renderTodo(t);
    });
    sectionsHTML += '</div>';
  });
  document.getElementById('todo-sections').innerHTML = sectionsHTML;

  // Done items
  document.getElementById('done-count').textContent = doneItems.length;
  var doneHTML = '';
  doneItems.forEach(function(t) { doneHTML += renderTodo(t); });
  document.getElementById('done-list').innerHTML = doneHTML;
}

function renderTodo(t) {
  var cls = t.done ? 'todo done' : 'todo';
  var pBadge = '';
  if (t.priority === 'high') pBadge = '<span class="todo-priority p-high">urgent</span>';
  else if (t.priority === 'med') pBadge = '<span class="todo-priority p-med">today</span>';
  var rateBadge = '';
  if (t.rate) {
    var rClass = t.rev ? 'rate-rev' : 'rate-ops';
    rateBadge = '<span class="todo-rate '+rClass+'">'+(t.rev?'💰 ':'⚙️ ')+t.rate+'</span>';
  }
  var html = '<div class="'+cls+'" onclick="toggleTodo('+t._idx+')">';
  html += '<div class="todo-check"></div>';
  html += '<div class="todo-content">';
  html += '<div class="todo-text">' + t.text + pBadge + rateBadge + '</div>';
  if (t.meta) html += '<div class="todo-meta">' + t.meta + '</div>';
  html += '</div></div>';
  return html;
}

function toggleTodo(idx) {
  DATA.todos[idx].done = !DATA.todos[idx].done;
  saveTodoState();
  render();
}

function saveTodoState() {
  // Save by text key so command center can read the same state
  var state = {};
  var stateByText = {};
  DATA.todos.forEach(function(t, i) {
    if (t.done) {
      state[i] = true;
      stateByText[t.text] = true;
    }
  });
  localStorage.setItem('todo-done-state', JSON.stringify(state));
  localStorage.setItem('todo-done-shared', JSON.stringify(stateByText));
}

function loadTodoState() {
  // First load by index (legacy), then overlay shared state by text
  var state = JSON.parse(localStorage.getItem('todo-done-state') || '{}');
  var shared = JSON.parse(localStorage.getItem('todo-done-shared') || '{}');
  Object.keys(state).forEach(function(i) {
    if (DATA.todos[parseInt(i)]) DATA.todos[parseInt(i)].done = state[i];
  });
  // Also load items marked done from command center (shared by text key)
  DATA.todos.forEach(function(t) {
    if (shared[t.text]) t.done = true;
  });
}

function toggleDone() {
  var el = document.getElementById('done-list');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function toggleRoutine() {
  var el = document.getElementById('routine-list');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function toggleNN(id) {
  var today = new Date().toDateString();
  var nnState = JSON.parse(localStorage.getItem('nn-state') || '{}');
  if (nnState.date !== today) { nnState = { date: today, done: {} }; }
  nnState.done[id] = !nnState.done[id];
  localStorage.setItem('nn-state', JSON.stringify(nnState));
  render();
}

loadTodoState();
render();
</script>


</body>
</html>
