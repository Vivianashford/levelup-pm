<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Clients - The Arena Partners</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#f5f0e8;min-height:100vh;}
  .container{max-width:900px;margin:0 auto;padding:16px 16px 40px;}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .header h1{font-family:'Playfair Display',serif;font-size:20px;color:#c9a84c;}
  .back-link{font-size:11px;color:#6b655e;text-decoration:none;}

  /* Tabs */
  .tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid rgba(255,255,255,.06);}
  .tab{padding:10px 20px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#6b655e;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
  .tab:hover{color:#9a9590;}
  .tab.active{color:#c9a84c;border-bottom-color:#c9a84c;}
  .tab .badge{display:inline-block;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;}
  .tab.active .badge{background:rgba(201,168,76,.2);color:#c9a84c;}

  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* Client Card */
  .client-card{background:#111;border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .15s;}
  .client-card:hover{border-color:rgba(201,168,76,.2);}
  .client-card.urgent{border-left:3px solid #d9534f;}
  .client-card.reviewed{border-left:3px solid #5cb85c;}
  .client-card.completed{border-left:3px solid #6a9fd8;opacity:.7;}

  .card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
  .card-left{flex:1;}
  .card-name{font-size:14px;font-weight:700;color:#f5f0e8;}
  .card-company{font-size:11px;color:#9a9590;margin-top:1px;}
  .card-right{display:flex;align-items:center;gap:8px;}
  .card-stage{font-size:9px;padding:3px 8px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
  .card-arrow{color:#6b655e;font-size:12px;transition:transform .2s;}
  .card-arrow.open{transform:rotate(90deg);}

  /* Expanded Detail */
  .card-body{display:none;padding:0 14px 14px;border-top:1px solid rgba(255,255,255,.04);}
  .card-body.open{display:block;}

  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:12px;}
  .info-item{padding:4px 0;}
  .info-label{font-size:9px;color:#6b655e;text-transform:uppercase;letter-spacing:.5px;}
  .info-value{font-size:12px;color:#f5f0e8;font-weight:500;}

  .section-title{font-size:10px;color:#c9a84c;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px;font-weight:700;}

  /* Progress bars */
  .progress-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .progress-label{font-size:10px;color:#9a9590;width:120px;}
  .progress-bar{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:3px;transition:width .3s;}

  /* Fulfilled / Missing */
  .checklist{margin-bottom:8px;}
  .check-item{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:11px;}
  .check-done{color:#5cb85c;}
  .check-missing{color:#d9534f;}

  /* Files */
  .file-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,.03);}
  .file-name{color:#9a9590;}
  .file-link{color:#c9a84c;text-decoration:none;font-size:10px;}

  /* Review button */
  .review-btn{display:inline-block;padding:6px 16px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .15s;margin-top:8px;}
  .btn-mark-reviewed{background:rgba(92,184,92,.15);color:#5cb85c;}
  .btn-mark-reviewed:hover{background:rgba(92,184,92,.25);}
  .btn-mark-complete{background:rgba(106,159,216,.15);color:#6a9fd8;}
  .btn-mark-complete:hover{background:rgba(106,159,216,.25);}
  .btn-undo{background:rgba(255,255,255,.06);color:#9a9590;}
  .btn-undo:hover{background:rgba(255,255,255,.1);}

  .empty-state{text-align:center;padding:40px;color:#4a4540;font-size:12px;}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Clients</h1>
    <a href="index.html" class="back-link">&larr; Command Center</a>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('urgent')">Urgent <span class="badge" id="badge-urgent">0</span></div>
    <div class="tab" onclick="switchTab('reviewed')">Reviewed <span class="badge" id="badge-reviewed">0</span></div>
    <div class="tab" onclick="switchTab('completed')">Completed <span class="badge" id="badge-completed">0</span></div>
  </div>

  <div id="tab-urgent" class="tab-content active"></div>
  <div id="tab-reviewed" class="tab-content"></div>
  <div id="tab-completed" class="tab-content"></div>

</div>

<script>
var WORKER='https://arena-api.jean-475.workers.dev';
var STAGE_COLORS={
  'vsl_lead':'#6b655e','call_booked':'#6a9fd8','assessment_done':'#6a9fd8',
  'call_complete':'#c9a84c','nda_signed':'#c9a84c','due_diligence':'#c9a84c',
  '2nd_call_proposal':'#c9a84c','closed_won':'#5cb85c',
  'no_show':'#d9534f','long_term_nurture':'#9a9590'
};
var STAGE_LABELS={
  'vsl_lead':'VSL Lead','call_booked':'Call Booked','assessment_done':'Assessment',
  'call_complete':'Call Complete','nda_signed':'NDA Signed','due_diligence':'Due Diligence',
  '2nd_call_proposal':'Proposal','closed_won':'Closed Won',
  'no_show':'No Show','long_term_nurture':'Nurture'
};

// Load review state from localStorage
function getReviewState(){
  return JSON.parse(localStorage.getItem('arena-client-review')||'{}');
}
function setReviewState(state){
  localStorage.setItem('arena-client-review',JSON.stringify(state));
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  event.target.closest('.tab').classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

function toggleCard(id){
  var body=document.getElementById('body-'+id);
  var arrow=document.getElementById('arrow-'+id);
  if(body){
    body.classList.toggle('open');
    if(arrow) arrow.classList.toggle('open');
    // Load files on first open
    if(body.classList.contains('open')&&!body.dataset.loaded){
      body.dataset.loaded='1';
      var slug=body.dataset.slug;
      if(slug) loadFiles(slug,id);
    }
  }
}

function markReviewed(id){
  var s=getReviewState();
  s[id]='reviewed';
  setReviewState(s);
  renderAll();
}
function markComplete(id){
  var s=getReviewState();
  s[id]='completed';
  setReviewState(s);
  renderAll();
}
function markUndo(id){
  var s=getReviewState();
  delete s[id];
  setReviewState(s);
  renderAll();
}

function slugify(name){
  return (name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function formatDate(d){
  if(!d) return '-';
  var dt=new Date(d);
  var now=new Date();
  var diff=Math.floor((now-dt)/(1000*60*60*24));
  var dateStr=(dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear();
  if(diff===0) return 'Today';
  if(diff===1) return 'Yesterday';
  if(diff<7) return diff+'d ago';
  return dateStr;
}

function stageColor(stage){return STAGE_COLORS[stage]||'#6b655e';}
function stageLabel(stage){return STAGE_LABELS[stage]||stage;}

function buildCard(c,reviewStatus){
  var id=c.id;
  var slug=slugify(c.company||c.name);
  var color=stageColor(c.stage);
  var cardClass='client-card';
  if(reviewStatus==='reviewed') cardClass+=' reviewed';
  else if(reviewStatus==='completed') cardClass+=' completed';
  else cardClass+=' urgent';

  var watchPct=c.watchPct||0;
  var riskScore=c.exitRiskScore||'-';
  var riskLevel=c.exitRiskLevel||'';

  // Fulfilled items
  var fulfilled=[];
  if(c.completed.indexOf('vsl-100')>-1||c.completed.indexOf('vsl-75')>-1) fulfilled.push('Training Video ('+watchPct+'%)');
  if(c.completed.indexOf('nda')>-1) fulfilled.push('NDA Signed');
  if(c.completed.indexOf('company-info')>-1) fulfilled.push('Company Info');
  if(c.exitRiskScore) fulfilled.push('Exit Assessment ('+riskScore+'/100)');

  var html='<div class="'+cardClass+'" id="card-'+id+'">';
  html+='<div class="card-header" onclick="toggleCard(\''+id+'\')">';
  html+='<div class="card-left">';
  html+='<div class="card-name">'+c.name+'</div>';
  html+='<div class="card-company">'+(c.company||'No company')+'</div>';
  html+='</div>';
  html+='<div class="card-right">';
  html+='<span class="card-stage" style="background:'+color+'22;color:'+color+';">'+stageLabel(c.stage)+'</span>';
  html+='<span class="card-arrow" id="arrow-'+id+'">&#9654;</span>';
  html+='</div></div>';

  // Expandable body
  html+='<div class="card-body" id="body-'+id+'" data-slug="'+slug+'">';

  // Contact info grid
  html+='<div class="info-grid">';
  html+='<div class="info-item"><div class="info-label">Name</div><div class="info-value">'+c.name+'</div></div>';
  html+='<div class="info-item"><div class="info-label">Company</div><div class="info-value">'+(c.company||'-')+'</div></div>';
  html+='<div class="info-item"><div class="info-label">Email</div><div class="info-value">'+(c.email||'-')+'</div></div>';
  html+='<div class="info-item"><div class="info-label">Phone</div><div class="info-value">'+(c.phone||'-')+'</div></div>';
  html+='<div class="info-item"><div class="info-label">Stage</div><div class="info-value" style="color:'+color+';">'+stageLabel(c.stage)+'</div></div>';
  html+='<div class="info-item"><div class="info-label">Added</div><div class="info-value">'+formatDate(c.dateAdded)+'</div></div>';
  html+='<div class="info-item"><div class="info-label">Last Update</div><div class="info-value">'+formatDate(c.lastUpdate)+'</div></div>';
  html+='<div class="info-item"><div class="info-label">Value</div><div class="info-value">'+(c.value>0?'$'+c.value.toLocaleString():'-')+'</div></div>';
  html+='</div>';

  // Scores section
  html+='<div class="section-title">Scores</div>';
  html+='<div class="progress-row"><span class="progress-label">Training Video</span><div class="progress-bar"><div class="progress-fill" style="width:'+watchPct+'%;background:'+(watchPct>=75?'#5cb85c':watchPct>=50?'#c9a84c':'#d9534f')+';"></div></div><span style="font-size:10px;color:#9a9590;width:35px;text-align:right;">'+watchPct+'%</span></div>';

  if(c.exitRiskScore){
    var rs=parseInt(c.exitRiskScore)||0;
    html+='<div class="progress-row"><span class="progress-label">Exit Risk</span><div class="progress-bar"><div class="progress-fill" style="width:'+rs+'%;background:'+(rs>=70?'#d9534f':rs>=40?'#c9a84c':'#5cb85c')+';"></div></div><span style="font-size:10px;color:#9a9590;width:35px;text-align:right;">'+rs+'/100</span></div>';
  }
  if(c.leadScore){
    html+='<div class="progress-row"><span class="progress-label">Lead Score</span><div class="progress-bar"><div class="progress-fill" style="width:'+Math.min(parseInt(c.leadScore)||0,100)+'%;background:#6a9fd8;"></div></div><span style="font-size:10px;color:#9a9590;width:35px;text-align:right;">'+c.leadScore+'</span></div>';
  }

  // Risk breakdown if available
  if(c.ownerDependency||c.customerConcentration||c.sopScore){
    html+='<div class="section-title">Risk Breakdown</div>';
    html+='<div class="info-grid">';
    if(c.ownerDependency) html+='<div class="info-item"><div class="info-label">Owner Dependency</div><div class="info-value">'+c.ownerDependency+'</div></div>';
    if(c.customerConcentration) html+='<div class="info-item"><div class="info-label">Customer Concentration</div><div class="info-value">'+c.customerConcentration+'</div></div>';
    if(c.sopScore) html+='<div class="info-item"><div class="info-label">SOP Documentation</div><div class="info-value">'+c.sopScore+'</div></div>';
    if(c.ebitdaScore) html+='<div class="info-item"><div class="info-label">EBITDA Trajectory</div><div class="info-value">'+c.ebitdaScore+'</div></div>';
    if(c.financialClean) html+='<div class="info-item"><div class="info-label">Financial Cleanliness</div><div class="info-value">'+c.financialClean+'</div></div>';
    if(c.successionScore) html+='<div class="info-item"><div class="info-label">Succession Plan</div><div class="info-value">'+c.successionScore+'</div></div>';
    if(c.exitTimeline) html+='<div class="info-item"><div class="info-label">Exit Timeline</div><div class="info-value">'+c.exitTimeline+'</div></div>';
    html+='</div>';
  }

  // Fulfilled
  html+='<div class="section-title">Fulfilled</div><div class="checklist">';
  if(fulfilled.length){
    fulfilled.forEach(function(f){
      html+='<div class="check-item check-done">&#10003; '+f+'</div>';
    });
  } else {
    html+='<div class="check-item" style="color:#4a4540;">Nothing completed yet</div>';
  }
  html+='</div>';

  // Missing
  if(c.missing&&c.missing.length){
    html+='<div class="section-title">Missing</div><div class="checklist">';
    c.missing.forEach(function(m){
      html+='<div class="check-item check-missing">&#10007; '+m+'</div>';
    });
    html+='</div>';
  }

  // Files
  html+='<div class="section-title">Files</div>';
  html+='<div id="files-'+id+'"><span style="font-size:10px;color:#4a4540;">Click to load files...</span></div>';

  // Action buttons
  html+='<div style="display:flex;gap:8px;margin-top:12px;">';
  if(reviewStatus!=='reviewed'&&reviewStatus!=='completed'){
    html+='<button class="review-btn btn-mark-reviewed" onclick="event.stopPropagation();markReviewed(\''+id+'\')">Mark Reviewed</button>';
    html+='<button class="review-btn btn-mark-complete" onclick="event.stopPropagation();markComplete(\''+id+'\')">Mark Complete</button>';
  } else if(reviewStatus==='reviewed'){
    html+='<button class="review-btn btn-mark-complete" onclick="event.stopPropagation();markComplete(\''+id+'\')">Mark Complete</button>';
    html+='<button class="review-btn btn-undo" onclick="event.stopPropagation();markUndo(\''+id+'\')">Move to Urgent</button>';
  } else {
    html+='<button class="review-btn btn-undo" onclick="event.stopPropagation();markUndo(\''+id+'\')">Reopen</button>';
  }
  html+='</div>';

  html+='</div></div>';
  return html;
}

function loadFiles(slug,id){
  var el=document.getElementById('files-'+id);
  if(!el) return;
  var slugs=[slug];
  var parts=slug.split('-');
  for(var i=parts.length-1;i>=1;i--) slugs.push(parts.slice(0,i).join('-'));

  function trySlug(idx){
    if(idx>=slugs.length){el.innerHTML='<span style="font-size:10px;color:#4a4540;">No files uploaded</span>';return;}
    fetch(WORKER+'/api/client-files/'+slugs[idx])
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.files&&data.files.length>0){
          var html='';
          data.files.forEach(function(f){
            var fname=f.key.split('/').pop().replace(/^\d+-/,'');
            var cat=f.key.split('/')[2]||'general';
            html+='<div class="file-row"><span class="file-name">'+cat+'/'+fname+'</span><a href="'+WORKER+'/files/'+f.key+'" target="_blank" class="file-link">View</a></div>';
          });
          el.innerHTML=html;
        } else { trySlug(idx+1); }
      }).catch(function(){trySlug(idx+1);});
  }
  trySlug(0);
}

var ALL_CLIENTS=[];

function renderAll(){
  var state=getReviewState();
  var urgent=[],reviewed=[],completed=[];

  ALL_CLIENTS.forEach(function(c){
    var rs=state[c.id];
    if(rs==='completed') completed.push(c);
    else if(rs==='reviewed') reviewed.push(c);
    else urgent.push(c);
  });

  // Sort urgent by most recent first
  urgent.sort(function(a,b){return new Date(b.lastUpdate||0)-new Date(a.lastUpdate||0);});

  document.getElementById('badge-urgent').textContent=urgent.length;
  document.getElementById('badge-reviewed').textContent=reviewed.length;
  document.getElementById('badge-completed').textContent=completed.length;

  var urgentHtml='';
  urgent.forEach(function(c){urgentHtml+=buildCard(c,null);});
  document.getElementById('tab-urgent').innerHTML=urgentHtml||'<div class="empty-state">No urgent clients - all reviewed</div>';

  var reviewedHtml='';
  reviewed.forEach(function(c){reviewedHtml+=buildCard(c,'reviewed');});
  document.getElementById('tab-reviewed').innerHTML=reviewedHtml||'<div class="empty-state">No reviewed clients</div>';

  var completedHtml='';
  completed.forEach(function(c){completedHtml+=buildCard(c,'completed');});
  document.getElementById('tab-completed').innerHTML=completedHtml||'<div class="empty-state">No completed clients</div>';
}

// Load data
fetch('data.json?t='+Date.now())
  .then(function(r){return r.json();})
  .then(function(d){
    ALL_CLIENTS=d.clients||[];
    if(ALL_CLIENTS.length){
      renderAll();
    } else {
      document.getElementById('tab-urgent').innerHTML='<div class="empty-state">No clients in pipeline yet</div>';
    }
  })
  .catch(function(){
    document.getElementById('tab-urgent').innerHTML='<div class="empty-state">Could not load data</div>';
  });
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js?v=2');}</script>
</body>
</html>
