<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up With Anna — Project Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:#0a0a0a; color:#f0ebe3; min-height:100vh; }

  .header { padding:30px 24px 20px; border-bottom:1px solid rgba(201,168,76,.15); }
  .header h1 { font-family:'Playfair Display',serif; font-size:24px; color:#c9a84c; }
  .header .sub { font-size:13px; color:#6b655e; margin-top:4px; }
  .header .updated { font-size:11px; color:#4a4540; margin-top:8px; }

  .dashboard { max-width:900px; margin:0 auto; padding:20px; }

  /* STATS ROW */
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:28px; }
  .stat-card { background:#141414; border:1px solid rgba(201,168,76,.12); border-radius:10px; padding:16px; text-align:center; }
  .stat-num { font-family:'Playfair Display',serif; font-size:32px; color:#c9a84c; }
  .stat-label { font-size:11px; color:#6b655e; text-transform:uppercase; letter-spacing:1.5px; margin-top:4px; }

  /* SECTION */
  .section { margin-bottom:28px; }
  .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid rgba(201,168,76,.1); }
  .section-title { font-size:13px; color:#c9a84c; text-transform:uppercase; letter-spacing:2px; font-weight:600; }
  .section-count { font-size:12px; color:#6b655e; }

  /* EXPENSE TABLE */
  .expense-row { display:grid; grid-template-columns:1fr 100px 100px 90px; gap:8px; padding:10px 12px; background:#141414; border:1px solid rgba(255,255,255,.04); border-radius:8px; margin-bottom:6px; align-items:center; font-size:13px; }
  .expense-row:hover { border-color:rgba(201,168,76,.2); }
  .expense-name { color:#f0ebe3; font-weight:500; }
  .expense-amount { color:#c9a84c; font-weight:600; text-align:right; }
  .expense-date { color:#9a9590; text-align:right; }
  .expense-status { text-align:center; }
  .expense-header { color:#6b655e; font-weight:600; text-transform:uppercase; font-size:10px; letter-spacing:1px; background:transparent; border:none; }

  /* STATUS BADGES */
  .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  .badge-due { background:rgba(201,168,76,.15); color:#c9a84c; }
  .badge-paid { background:rgba(74,140,92,.15); color:#4a8c5c; }
  .badge-overdue { background:rgba(184,60,48,.15); color:#b83c30; }
  .badge-upcoming { background:rgba(100,100,120,.15); color:#8888aa; }

  /* ARTICLE TABLE */
  .article-row { display:grid; grid-template-columns:1fr 90px 90px; gap:8px; padding:10px 12px; background:#141414; border:1px solid rgba(255,255,255,.04); border-radius:8px; margin-bottom:6px; align-items:center; font-size:13px; }
  .article-row:hover { border-color:rgba(201,168,76,.2); }
  .article-title { color:#f0ebe3; font-weight:500; }
  .article-title a { color:#f0ebe3; text-decoration:none; }
  .article-title a:hover { color:#c9a84c; text-decoration:underline; }
  .article-platform { color:#6b655e; font-size:11px; }
  .article-header { color:#6b655e; font-weight:600; text-transform:uppercase; font-size:10px; letter-spacing:1px; background:transparent; border:none; }

  .badge-published { background:rgba(74,140,92,.15); color:#4a8c5c; }
  .badge-draft { background:rgba(201,168,76,.15); color:#c9a84c; }
  .badge-writing { background:rgba(100,140,200,.15); color:#6a9fd8; }
  .badge-idea { background:rgba(100,100,120,.15); color:#8888aa; }

  /* MOBILE */
  @media(max-width:600px) {
    .expense-row { grid-template-columns:1fr 80px; }
    .expense-date, .expense-status { display:none; }
    .article-row { grid-template-columns:1fr 80px; }
    .stat-card { padding:12px 8px; }
    .stat-num { font-size:26px; }
  }
</style>
</head>
<body>

<div class="dashboard">
  <div class="header">
    <h1>Level Up With Anna</h1>
    <div class="sub">Project Dashboard</div>
    <div class="updated" id="last-updated"></div>
  </div>

  <!-- STATS -->
  <div class="stats" id="stats-row"></div>

  <!-- UPCOMING EXPENSES -->
  <div class="section" id="expenses-section">
    <div class="section-head">
      <span class="section-title">Upcoming Expenses</span>
      <span class="section-count" id="expense-count"></span>
    </div>
    <div class="expense-row expense-header">
      <span>Description</span>
      <span style="text-align:right">Amount</span>
      <span style="text-align:right">Due</span>
      <span style="text-align:center">Status</span>
    </div>
    <div id="expense-list"></div>
  </div>

  <!-- ARTICLES -->
  <div class="section" id="articles-section">
    <div class="section-head">
      <span class="section-title">Content Tracker</span>
      <span class="section-count" id="article-count"></span>
    </div>
    <div class="article-row article-header">
      <span>Title</span>
      <span style="text-align:center">Status</span>
      <span style="text-align:center">Platform</span>
    </div>
    <div id="article-list"></div>
  </div>
</div>

<script>
// ============================================================
// DATA — Edit this section to update the dashboard
// ============================================================
var DATA = {
  lastUpdated: "March 20, 2026 — 6:30 AM CDT",

  expenses: [
    { name: "Asim Zahoor — Accounting/Reconciliation", amount: 432, due: "2026-04-03", status: "upcoming" },
  ],

  articles: [
    // STATUS: published | draft | writing | idea
    { title: "The Google Test: What Prospects Find When They Search Your Name", status: "published", platform: "GitHub Pages", link: "https://vivianashford.github.io/levelup-anna-blog/the-google-test-what-prospects-find.html", date: "2026-03-17" },
    { title: "How PR Builds Trust Before the First Meeting", status: "published", platform: "GitHub Pages", link: "https://vivianashford.github.io/levelup-anna-blog/how-pr-builds-trust-before-the-first-meeting.html", date: "2026-03-17" },
    { title: "The Crisis Management Playbook", status: "published", platform: "GitHub Pages", link: "https://vivianashford.github.io/levelup-anna-blog/crisis-management-playbook.html", date: "2026-03-18" },
    { title: "The Ripple Effect: How One Media Mention Can Transform Your Business", status: "published", platform: "GitHub Pages", link: "https://vivianashford.github.io/levelup-anna-blog/the-ripple-effect-media-mentions.html", date: "2026-03-18" },
    { title: "How to Choose the Right PR Package for Your Business", status: "published", platform: "GitHub Pages", link: "https://vivianashford.github.io/levelup-anna-blog/how-to-choose-the-right-pr-package.html", date: "2026-03-18" },
    { title: "Why Your Business Needs PR Before It Needs More Revenue", status: "published", platform: "GitHub Pages", link: "https://vivianashford.github.io/levelup-anna-blog/why-your-business-needs-pr-before-revenue.html", date: "2026-03-19" },
    { title: "Why Personal Branding Is the New Business Card", status: "published", platform: "GitHub Pages", link: "https://vivianashford.github.io/levelup-anna-blog/why-personal-branding-is-the-new-business-card.html", date: "2026-03-19" },
  ]
};

// ============================================================
// RENDER
// ============================================================
function render() {
  // Last updated
  document.getElementById('last-updated').textContent = 'Last updated: ' + DATA.lastUpdated;

  // Stats
  var published = DATA.articles.filter(function(a){return a.status==='published'}).length;
  var draft = DATA.articles.filter(function(a){return a.status==='draft'}).length;
  var writing = DATA.articles.filter(function(a){return a.status==='writing'}).length;
  var ideas = DATA.articles.filter(function(a){return a.status==='idea'}).length;
  var totalExpenses = DATA.expenses.reduce(function(s,e){return s+e.amount},0);

  var statsHTML = '';
  statsHTML += '<div class="stat-card"><div class="stat-num">'+DATA.articles.length+'</div><div class="stat-label">Total Articles</div></div>';
  statsHTML += '<div class="stat-card"><div class="stat-num">'+published+'</div><div class="stat-label">Published</div></div>';
  statsHTML += '<div class="stat-card"><div class="stat-num">'+writing+'</div><div class="stat-label">In Progress</div></div>';
  statsHTML += '<div class="stat-card"><div class="stat-num">'+draft+'</div><div class="stat-label">Drafts</div></div>';
  statsHTML += '<div class="stat-card"><div class="stat-num">$'+totalExpenses.toLocaleString()+'</div><div class="stat-label">Expenses</div></div>';
  document.getElementById('stats-row').innerHTML = statsHTML;

  // Expenses
  document.getElementById('expense-count').textContent = DATA.expenses.length + ' items';
  var expHTML = '';
  DATA.expenses.forEach(function(e) {
    var badgeClass = 'badge-' + e.status;
    var dueDate = new Date(e.due+'T00:00:00');
    var now = new Date();
    if (e.status !== 'paid' && dueDate < now) badgeClass = 'badge-overdue';
    var dateStr = dueDate.toLocaleDateString('en-US', {month:'short',day:'numeric'});
    expHTML += '<div class="expense-row">';
    expHTML += '<span class="expense-name">'+e.name+'</span>';
    expHTML += '<span class="expense-amount">$'+e.amount.toLocaleString()+'</span>';
    expHTML += '<span class="expense-date">'+dateStr+'</span>';
    expHTML += '<span class="expense-status"><span class="badge '+badgeClass+'">'+e.status+'</span></span>';
    expHTML += '</div>';
  });
  document.getElementById('expense-list').innerHTML = expHTML;

  // Articles - sort: writing first, then draft, then published (newest first)
  var sorted = DATA.articles.slice().sort(function(a,b) {
    var order = {writing:0, draft:1, idea:2, published:3};
    var oa = order[a.status]||9, ob = order[b.status]||9;
    if (oa !== ob) return oa - ob;
    return (b.date||'').localeCompare(a.date||'');
  });

  document.getElementById('article-count').textContent = published+' published · '+writing+' in progress · '+draft+' drafts · '+ideas+' ideas';
  var artHTML = '';
  sorted.forEach(function(a) {
    artHTML += '<div class="article-row">';
    if (a.link) {
      artHTML += '<span class="article-title"><a href="'+a.link+'" target="_blank">'+a.title+'</a></span>';
    } else {
      artHTML += '<span class="article-title">'+a.title+'</span>';
    }
    artHTML += '<span style="text-align:center"><span class="badge badge-'+a.status+'">'+a.status+'</span></span>';
    artHTML += '<span class="article-platform" style="text-align:center">'+a.platform+'</span>';
    artHTML += '</div>';
  });
  document.getElementById('article-list').innerHTML = artHTML;
}

render();
</script>
</body>
</html>
