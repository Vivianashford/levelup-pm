*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#08080c;color:#e8e4dc;min-height:100vh}
a{color:#c9a84c;text-decoration:none}

.topbar{background:#0e0e14;border-bottom:1px solid #1a1a24;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.topbar h1{font-family:'Playfair Display',serif;font-size:20px;color:#c9a84c}

.topbar a:hover{color:#c9a84c}

.main{max-width:1000px;margin:0 auto;padding:24px}

.search-box{width:100%;padding:12px 16px;background:#0e0e14;border:1px solid #1a1a24;border-radius:8px;color:#e8e4dc;font-size:14px;font-family:'DM Sans',sans-serif;margin-bottom:24px;outline:none}
.search-box:focus{border-color:#c9a84c40}
.search-box::placeholder{color:#444}

.section{margin-bottom:32px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #1a1a24}
.section-icon{font-size:20px}
.section-title{font-family:'Playfair Display',serif;font-size:16px;color:#c9a84c}
.section-count{font-size:11px;color:#444;margin-left:auto}

.link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.link-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0e0e14;border:1px solid #1a1a24;border-radius:8px;transition:all .15s;cursor:pointer}
.link-item:hover{background:#12121a;border-color:#c9a84c30}
.link-item .icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.link-item .info{flex:1;min-width:0}
.link-item .name{font-size:13px;color:#e8e4dc;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-item .url{font-size:10px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.link-item .badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px}
.badge-live{background:rgba(34,197,94,.1);color:#22c55e}
.badge-pending{background:rgba(201,168,76,.1);color:#c9a84c}
.badge-internal{background:rgba(100,100,120,.1);color:#666}
.badge-blog{background:rgba(106,159,216,.1);color:#6a9fd8}

.hidden{display:none!important}

.stats{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.stat{font-size:12px;color:#666}
.stat strong{color:#c9a84c;font-size:16px}

function renderAll() {
  var sectionsHtml = '';
  var totalLinks = 0;
  var totalLive = 0;
  var sectionKeys = Object.keys(LINKS);

  sectionKeys.forEach(function(key) {
    var section = LINKS[key];
    totalLinks += section.items.length;
    section.items.forEach(function(item) { if (item.badge === 'live' || item.badge === 'blog') totalLive++; });

    sectionsHtml += '<div class="section" data-section="' + key + '">' +
      '<div class="section-header">' +
      '<span class="section-icon">' + section.icon + '</span>' +
      '<span class="section-title">' + key + '</span>' +
      '<span class="section-count">' + section.items.length + ' links</span>' +
      '</div>' +
      '<div class="link-grid">';

    section.items.forEach(function(item) {
      var badgeClass = item.badge === 'live' ? 'badge-live' : item.badge === 'blog' ? 'badge-blog' : item.badge === 'pending' ? 'badge-pending' : 'badge-internal';
      sectionsHtml += '<a href="' + item.url + '" target="_blank" class="link-item" data-search="' + (item.name + ' ' + item.url).toLowerCase() + '">' +
        '<div class="info"><div class="name">' + item.name + '</div><div class="url">' + item.url.replace('https://', '').replace('http://', '') + '</div></div>' +
        '<span class="badge ' + badgeClass + '">' + item.badge + '</span></a>';
    });

    sectionsHtml += '</div></div>';
  });

  document.getElementById('sections').innerHTML = sectionsHtml;
  document.getElementById('stats').innerHTML =
    '<div class="stat"><strong>' + totalLinks + '</strong> total links</div>' +
    '<div class="stat"><strong>' + totalLive + '</strong> public/live</div>' +
    '<div class="stat"><strong>' + sectionKeys.length + '</strong> categories</div>';
}

function filterLinks() {
  var q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.link-item').forEach(function(el) {
    el.classList.toggle('hidden', q && el.dataset.search.indexOf(q) === -1);
  });
  document.querySelectorAll('.section').forEach(function(el) {
    var visible = el.querySelectorAll('.link-item:not(.hidden)').length;
    el.classList.toggle('hidden', q && visible === 0);
  });
}

renderAll();
